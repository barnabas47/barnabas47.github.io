{% assign lang = page.lang | default: "hu" %}
{% assign t = site.data.locales[lang] %}
<!-- Header -->
<header>
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <!-- Relative URL ensures it works on github pages with subpaths -->
        <img class="img-responsive" src="{{ "/img/profile.png" | relative_url }}" alt="profile-pic" />
        <div class="intro-text">
          <span class="name">{{ t.title }}</span>
          <hr class="star-light" />
          <span class="skills">{{ t.skills }}</span>
        </div>
      </div>
    </div>
  </div>
</header>
