{% assign lang = page.lang | default: "hu" %}
{% assign t = site.data.locales[lang] %}
<!-- Language Switcher -->
<div class="language-switcher">
  <a href="/" class="{% if lang == 'hu' %}active{% endif %}">{{ t.lang_hu | default: "🇭🇺 Magyar" }}</a>
  <a href="/en/" class="{% if lang == 'en' %}active{% endif %}">{{ t.lang_en | default: "🇺🇸 English" }}</a>
</div>
