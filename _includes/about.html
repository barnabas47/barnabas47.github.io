{% assign lang = page.lang | default: "hu" %}
{% assign t = site.data.locales[lang] %}
<!-- About Section -->
<section class="success" id="about">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>{{ t.about_title }}</h2>
        <hr class="star-light">
      </div>
    </div>
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2">
        <p>{{ t.about_text }}</p>
      </div>
    </div>
  </div>
</section>
